name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Type-check (mypy)
        run: mypy
      - name: Test (pytest)
        run: pytest
      - name: Smoke-test the demo (in-memory and SQLite backends)
        run: |
          python scripts/demo.py
          NUMERA_PERSISTENCE=sqlite NUMERA_DATABASE_URL="sqlite:///ci.db" python scripts/demo.py
